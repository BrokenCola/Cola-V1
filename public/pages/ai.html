<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cola AI</title>
    <link rel="shortcut icon" href="/assets/img/fav.png" type="image/x-icon" />
    <link rel="stylesheet" href="/assets/css/font.css?v=2" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/icons/css/all-pro.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: #ecedee;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .ai-sidebar {
            width: 260px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }

        .ai-sidebar-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 16px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #ecedee;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background: #333333;
            border-color: #4a4a4a;
        }

        .search-box {
            width: 100%;
            padding: 10px 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #ecedee;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .search-box::placeholder {
            color: #8a8a8a;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #b4b4b4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
        }

        .chat-item:hover {
            background: #2a2a2a;
            color: #ecedee;
        }

        .sidebar-footer {
            padding-top: 12px;
            border-top: 1px solid #2a2a2a;
            font-size: 12px;
            color: #8a8a8a;
        }

        /* MAIN AREA */
        .ai-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
        }

        .ai-header {
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .rate-limit-indicator {
            font-size: 12px;
            padding: 6px 12px;
            background: #2a2a2a;
            border-radius: 6px;
            color: #b4b4b4;
        }

        .rate-limit-indicator.critical {
            background: #3d2e2e;
            color: #ff7b7b;
        }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .chat-empty {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex: 1;
            gap: 32px;
        }

        .chat-empty h2 {
            font-size: 32px;
            font-weight: 600;
            color: #ecedee;
        }

        .example-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            max-width: 900px;
            width: 100%;
        }

        .example-card {
            padding: 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .example-card:hover {
            background: #252525;
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .example-card-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .example-card-title {
            font-weight: 500;
            margin-bottom: 4px;
            color: #ecedee;
        }

        .example-card-desc {
            font-size: 12px;
            color: #8a8a8a;
        }

        /* MESSAGES */
        .messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
        }

        .message.ai .message-content {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: #2a2a2a;
        }

        .message.user .message-avatar {
            background: #3a5a7a;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8a8a8a;
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* INPUT AREA */
        .input-area {
            padding: 20px;
            border-top: 1px solid #2a2a2a;
            background: #0d0d0d;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #ecedee;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none;
            max-height: 120px;
            min-height: 44px;
        }

        .input-field::placeholder {
            color: #8a8a8a;
        }

        .input-field:focus {
            outline: none;
            border-color: #4a4a4a;
            background: #333333;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #8a8a8a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: #333333;
            border-color: #4a4a4a;
            color: #ecedee;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- SIDEBAR -->
    <aside class="ai-sidebar">
        <div class="ai-sidebar-header">
            🥤 Cola AI
        </div>
        <button class="new-chat-btn" onclick="newChat()">
            <i class="fas fa-plus"></i>
            New Chat
        </button>
        <input type="text" class="search-box" placeholder="Search chats...">
        <div class="chat-history" id="chatHistory">
            <!-- Chat history items will go here -->
        </div>
        <div class="sidebar-footer">
            Cola AI v1.0
        </div>
    </aside>

    <!-- MAIN -->
    <main class="ai-main">
        <header class="ai-header">
            <h1>New Chat</h1>
            <div class="rate-limit-indicator" id="rateLimitIndicator">
                5/5 requests available
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-empty" id="chatEmpty">
                <div>
                    <h2>What can I help<br>you with today?</h2>
                </div>
                <div class="example-cards">
                    <div class="example-card" onclick="sendExamplePrompt(this)">
                        <div class="example-card-icon">⚙️</div>
                        <div class="example-card-title">Explain quantum computing</div>
                        <div class="example-card-desc">in simple terms</div>
                    </div>
                    <div class="example-card" onclick="sendExamplePrompt(this)">
                        <div class="example-card-icon">🐍</div>
                        <div class="example-card-title">Python JSON parser</div>
                        <div class="example-card-desc">from an API endpoint</div>
                    </div>
                    <div class="example-card" onclick="sendExamplePrompt(this)">
                        <div class="example-card-icon">💡</div>
                        <div class="example-card-title">Creative startup ideas</div>
                        <div class="example-card-desc">in the AI space</div>
                    </div>
                    <div class="example-card" onclick="sendExamplePrompt(this)">
                        <div class="example-card-icon">🎬</div>
                        <div class="example-card-title">Dark sci-fi story</div>
                        <div class="example-card-desc">about a rogue AI</div>
                    </div>
                </div>
            </div>
            <div class="messages" id="messagesContainer"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="input-field" id="inputField" placeholder="Message Cola AI..." onkeydown="handleKeyPress(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        // RATE LIMITING: 5 requests per 10 minutes
        const RATE_LIMIT_MAX = 5;
        const RATE_LIMIT_WINDOW = 10 * 60 * 1000; // 10 minutes in ms
        const RATE_LIMIT_KEY = 'cola_ai_rate_limit';

        function getRateLimitData() {
            const stored = localStorage.getItem(RATE_LIMIT_KEY);
            if (!stored) return { requests: [], remaining: RATE_LIMIT_MAX };

            const data = JSON.parse(stored);
            const now = Date.now();

            // Remove old requests outside the 10-minute window
            data.requests = data.requests.filter(timestamp => now - timestamp < RATE_LIMIT_WINDOW);

            return {
                requests: data.requests,
                remaining: RATE_LIMIT_MAX - data.requests.length
            };
        }

        function recordRequest() {
            const data = getRateLimitData();
            data.requests.push(Date.now());
            localStorage.setItem(RATE_LIMIT_KEY, JSON.stringify(data));
            updateRateLimitUI();
        }

        function updateRateLimitUI() {
            const data = getRateLimitData();
            const indicator = document.getElementById('rateLimitIndicator');
            indicator.textContent = `${data.remaining}/${RATE_LIMIT_MAX} requests available`;

            if (data.remaining === 0) {
                indicator.classList.add('critical');
            } else {
                indicator.classList.remove('critical');
            }

            document.getElementById('sendBtn').disabled = data.remaining === 0;
        }

        function canSendMessage() {
            const data = getRateLimitData();
            return data.remaining > 0;
        }

        function sendMessage() {
            if (!canSendMessage()) {
                alert('Rate limit exceeded. You can send 5 messages per 10 minutes.');
                return;
            }

            const input = document.getElementById('inputField');
            const message = input.value.trim();

            if (!message) return;

            // Remove empty state
            const chatEmpty = document.getElementById('chatEmpty');
            if (chatEmpty) {
                chatEmpty.style.display = 'none';
            }

            // Add user message
            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';

            // Record the request
            recordRequest();

            // Show typing indicator
            addTypingIndicator();

            // Simulate AI response (replace with real API call)
            setTimeout(() => {
                removeTypingIndicator();
                const aiResponse = generateAIResponse(message);
                addMessage(aiResponse, 'ai');
            }, 1500);
        }

        function addMessage(text, sender) {
            const container = document.getElementById('messagesContainer');
            const message = document.createElement('div');
            message.className = `message ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = sender === 'user' ? '👤' : '🤖';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;

            if (sender === 'user') {
                message.appendChild(content);
                message.appendChild(avatar);
            } else {
                message.appendChild(avatar);
                message.appendChild(content);
            }

            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }

        function addTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const message = document.createElement('div');
            message.className = 'message ai';
            message.id = 'typing-indicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const content = document.createElement('div');
            content.className = 'typing';
            content.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            message.appendChild(avatar);
            message.appendChild(content);

            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function generateAIResponse(userMessage) {
            const responses = [
                'That\'s an interesting question! I\'d be happy to help you explore that further.',
                'Great question! Here are some key points to consider...',
                'Based on what you\'ve asked, I think the best approach would be...',
                'That\'s a complex topic, but let me break it down for you.',
                'Absolutely! Let me provide you with some detailed information.',
                'I can definitely help with that. Here\'s what you should know...',
                'Excellent inquiry! Let me share some insights with you.',
                'That\'s something I can definitely elaborate on for you.'
            ];
            return responses[Math.floor(Math.random() * responses.length)];
        }

        function sendExamplePrompt(card) {
            const title = card.querySelector('.example-card-title').textContent;
            document.getElementById('inputField').value = title;
            document.getElementById('inputField').focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
            // Auto-resize textarea
            event.target.style.height = 'auto';
            event.target.style.height = Math.min(event.target.scrollHeight, 120) + 'px';
        }

        function newChat() {
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('chatEmpty').style.display = 'flex';
            document.getElementById('inputField').value = '';
        }

        // Initialize
        updateRateLimitUI();
        
        // Update rate limit indicator every second
        setInterval(updateRateLimitUI, 1000);
    </script>
</body>

</html>
