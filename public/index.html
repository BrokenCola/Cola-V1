<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cola - Your Ultimate Streaming Hub</title>
    <link rel="shortcut icon" href="/assets/img/fav.png" type="image/x-icon" />
    <link rel="stylesheet" href="/assets/css/font.css?v=2" />
    <link rel="stylesheet" href="/assets/css/colors/default.css" id="csslink" />
    <link rel="stylesheet" href="/assets/css/new-layout.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/icons/css/all-pro.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        html {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1628 100%);
        }

        .page-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1628 100%);
        }

        .hero-section {
            text-align: center;
            padding: 40px 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-title {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #3dd56d 0%, #00ff88 50%, #3dd56d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 100%;
            letter-spacing: -2px;
            margin: 20px 0;
            animation: gradientShift 3s ease-in-out infinite, fadeInUp 0.8s ease-out;
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% center;
            }
            50% {
                background-position: 100% center;
            }
        }

        .hero-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            animation: fadeInUp 0.9s ease-out 0.1s both;
        }

        .search-bar {
            max-width: 700px;
            margin: 0 auto 60px;
            position: relative;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .search-bar input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: #e0e0e0;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-bar input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #3dd56d;
            box-shadow: 0 0 0 4px rgba(61, 213, 109, 0.15);
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }

        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 0 auto 50px;
        }

        .shortcut-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: fadeInScale 0.6s ease-out;
        }

        .shortcut-card:nth-child(1) { animation-delay: 0.1s; }
        .shortcut-card:nth-child(2) { animation-delay: 0.2s; }
        .shortcut-card:nth-child(3) { animation-delay: 0.3s; }
        .shortcut-card:nth-child(4) { animation-delay: 0.4s; }
        .shortcut-card:nth-child(5) { animation-delay: 0.5s; }

        .shortcut-card:hover {
            background: rgba(61, 213, 109, 0.15);
            border-color: rgba(61, 213, 109, 0.5);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(61, 213, 109, 0.2);
        }

        .shortcut-icon {
            font-size: 32px;
            margin-bottom: 10px;
            color: #3dd56d;
            transition: transform 0.3s ease;
        }

        .shortcut-card:hover .shortcut-icon {
            transform: scale(1.2) rotate(5deg);
        }

        .shortcut-name {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            text-align: center;
        }

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            animation: fadeInUp 1.2s ease-out 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
    <script>
        if (localStorage.getItem("cola_completedOnboarding") !== "yes" && localStorage.getItem("cherri_completedOnboarding") !== "yes") {
            window.top.location.href = "/onboarding/";
        }
    </script>
</head>

                <button onclick="document.getElementById('modal-mc').classList.add('open')"

    <!-- MODAL -->
    <div class="modal-backdrop" id="modal-mc">
        <div class="modal" style="width: 380px; background: rgba(15, 20, 40, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);">

                <code
                    style="flex: 1; font-size: 0.85rem; color: #3dd56d; font-family: monospace;">wss://mc.cherrion.top/</code>
                <button onclick="navigator.clipboard.writeText('wss://mc.cherrion.top/')"

            </div>
            <div style="display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;">
                <button class="btn btn-ghost"
                    onclick="document.getElementById('modal-mc').classList.remove('open')" style="background: transparent; border: 1px solid rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.7); padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(61, 213, 109, 0.1)'; this.style.borderColor='rgba(61, 213, 109, 0.5)';"
